name: DealPulse Cron — Toutes les 30 min
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Appel Edge Function deal-pulse-cron
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://wnphyxusalptwqiimazk.supabase.co/functions/v1/deal-pulse-cron")
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "ERREUR: Edge function a retourné $response"
            exit 1
          fi
